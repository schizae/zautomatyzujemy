name: Tygodniowy Brief AI

on:
  schedule:
    - cron: '0 7 * * 1' # Każdy poniedziałek ~08:00 CET (07:00 UTC)
  workflow_dispatch: # Możliwość ręcznego uruchomienia z GitHub UI

jobs:
  generate-brief:
    name: Generuj i publikuj brief AI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generuj i publikuj brief
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node .github/scripts/blog-brief.mjs
